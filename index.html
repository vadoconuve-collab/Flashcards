<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards Angy the Teacher - Estudiante</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --nombre-profe: "Angy the teacher";
            --primary: #4a90e2; --success: #2ecc71; --error: #e74c3c; --bg: #f4f7f6; --dark: #2c3e50;
        }

        /* Marca de agua gigante de autor */
        body::before {
            content: var(--nombre-profe);
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: -1; font-family: 'Great Vibes', cursive; font-size: 8rem;
            color: rgba(74, 144, 226, 0.015); width: 95vw; text-align: center; white-space: nowrap; pointer-events: none;
        }
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap');

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--dark); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { max-width: 600px; width: 100%; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); text-align: center; z-index: 1; }
        .hidden { display: none; }
        
        .btn { background: var(--primary); color: white; border: none; padding: 15px 24px; border-radius: 12px; cursor: pointer; font-weight: 600; width: 100%; margin-top: 15px; font-size: 1rem; transition: 0.2s; }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-secondary { background: #6c757d; margin-top: 10px; }
        
        .mazo-item { display: flex; align-items: center; justify-content: space-between; background: #f8f9fa; margin: 12px 0; padding: 15px; border-radius: 12px; border: 1px solid #e0e0e0; font-weight: 500; }
        .card { font-size: 1.8rem; font-weight: bold; margin: 25px 0; padding: 50px 20px; border: 3px solid var(--primary); border-radius: 25px; background: #fff; min-height: 150px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .answer-text { display: none; margin-top: 20px; color: var(--success); font-size: 1.4rem; border-top: 1px solid #eee; pt: 15px; width: 80%; }
        
        #loading { font-style: italic; color: #888; margin: 20px; }
    </style>
</head>
<body>

<div class="container" id="app-home">
    <h1>📚 Mis Flashcards</h1>
    <p>Contenido actualizado por <strong>Angy the teacher</strong></p>
    
    <div id="loading">Conectando con la biblioteca...</div>

    <div id="contenido-app" class="hidden">
        <h3>Temas Disponibles</h3>
        <div id="lista-mazos"></div>
        <button id="btn-estudiar" class="btn" onclick="iniciarTest()">Empezar Test de Repaso</button>
    </div>
</div>

<div class="container hidden" id="visor-area">
    <h3 id="visor-titulo"></h3>
    <div class="card" onclick="voltearCarta()">
        <div id="p-texto"></div>
        <div id="r-texto" class="answer-text"></div>
        <small style="margin-top:20px; color:#bbb; font-size:0.8rem;">(Toca la tarjeta para ver respuesta)</small>
    </div>
    <div style="display:flex; gap:10px;">
        <button class="btn btn-secondary" onclick="navegarCarta(-1)">⬅️ Anterior</button>
        <button class="btn btn-secondary" onclick="navegarCarta(1)">Siguiente ➡️</button>
    </div>
    <button class="btn" style="background:#444;" onclick="location.reload()">Volver a la lista</button>
</div>

<div class="container hidden" id="test-area">
    <div id="test-progreso" style="font-weight:bold; color:var(--primary); margin-bottom:10px;"></div>
    <div class="card" id="test-pregunta" style="cursor:default;"></div>
    <div id="opciones-container"></div>
    <button class="btn btn-secondary" onclick="location.reload()">Abandonar</button>
</div>

<script>
    // TU LINK DE GOOGLE SHEETS
    const SHEETS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vThhYdCFgB1S2jQEhtXtyTaDh4NfNPa8XSkvPkIAvtr2No8Z1z3TYcCjxSqDT3kdnOSa2JMmnU8FP_1/pub?output=csv";

    let mazoGlobal = []; // Aquí guardaremos todo lo que viene de tu nube
    let currentIdx = 0;

    // 1. Cargar datos de la nube nada más abrir
    window.onload = function() {
        Papa.parse(SHEETS_URL, {
            download: true,
            header: false,
            skipEmptyLines: true,
            complete: function(results) {
                // Filtramos y limpiamos los datos
                mazoGlobal = results.data
                    .filter(row => row.length >= 2 && row[0].trim() !== "")
                    .map(row => ({ p: row[0].trim(), r: row[1].trim() }));

                if (mazoGlobal.length > 0) {
                    document.getElementById('loading').className = "hidden";
                    document.getElementById('contenido-app').className = "";
                    renderLista();
                } else {
                    document.getElementById('loading').innerText = "La biblioteca está vacía por ahora.";
                }
            },
            error: function() {
                document.getElementById('loading').innerText = "Error al conectar con la nube. Revisa tu conexión.";
            }
        });
    };

    function renderLista() {
        const lista = document.getElementById('lista-mazos');
        lista.innerHTML = `
            <div class="mazo-item">
                <span>📖 Mazo General (${mazoGlobal.length} tarjetas)</span>
                <button class="btn" style="width:auto; margin:0; padding:8px 15px;" onclick="abrirVisor()">Ver</button>
            </div>
        `;
    }

    // 2. Modo Visor (Anki)
    function abrirVisor() {
        currentIdx = 0;
        document.getElementById('app-home').classList.add('hidden');
        document.getElementById('visor-area').classList.remove('hidden');
        mostrarCartaVisor();
    }

    function mostrarCartaVisor() {
        document.getElementById('visor-titulo').innerText = `Repaso: ${currentIdx + 1} / ${mazoGlobal.length}`;
        document.getElementById('p-texto').innerText = mazoGlobal[currentIdx].p;
        document.getElementById('r-texto').innerText = mazoGlobal[currentIdx].r;
        document.getElementById('r-texto').style.display = 'none';
    }

    function voltearCarta() {
        const r = document.getElementById('r-texto');
        r.style.display = (r.style.display === 'none') ? 'block' : 'none';
    }

    function navegarCarta(dir) {
        currentIdx += dir;
        if (currentIdx < 0) currentIdx = mazoGlobal.length - 1;
        if (currentIdx >= mazoGlobal.length) currentIdx = 0;
        mostrarCartaVisor();
    }

    // 3. Modo Test (Opciones Múltiples)
    let testScore = 0;
    function iniciarTest() {
        mazoGlobal.sort(() => Math.random() - 0.5); // Mezclamos
        currentIdx = 0;
        testScore = 0;
        document.getElementById('app-home').classList.add('hidden');
        document.getElementById('test-area').classList.remove('hidden');
        mostrarPreguntaTest();
    }

    function mostrarPreguntaTest() {
        if (currentIdx >= mazoGlobal.length) {
            alert(`¡Test finalizado! Puntuación: ${testScore} de ${mazoGlobal.length}`);
            return location.reload();
        }

        const item = mazoGlobal[currentIdx];
        document.getElementById('test-progreso').innerText = `PREGUNTA ${currentIdx + 1} DE ${mazoGlobal.length}`;
        document.getElementById('test-pregunta').innerText = item.p;

        // Generar 4 opciones
        let opciones = [item.r];
        let otras = mazoGlobal.filter(x => x.r !== item.r).map(x => x.r);
        otras.sort(() => Math.random() - 0.5);
        opciones = [...opciones, ...otras.slice(0, 3)].sort(() => Math.random() - 0.5);

        const container = document.getElementById('opciones-container');
        container.innerHTML = "";
        opciones.forEach(opt => {
            const b = document.createElement('button');
            b.className = "btn btn-secondary";
            b.style.background = "white"; b.style.color = "#333"; b.style.border = "2px solid #eee";
            b.innerText = opt;
            b.onclick = () => {
                if (opt === item.r) testScore++;
                currentIdx++;
                mostrarPreguntaTest();
            };
            container.appendChild(b);
        });
    }
</script>
</body>
</html>
