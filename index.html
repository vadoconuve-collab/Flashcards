<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Aula Virtual Angy - Acceso Seguro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --primary: #4a90e2; --bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { max-width: 600px; width: 100%; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        .input-login { width: 80%; padding: 15px; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 1rem; }
        .btn { background: var(--primary); color: white; border: none; padding: 15px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; }
        .mazo-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; align-items: center; }
    </style>
</head>
<body>

<div class="container" id="login-area">
    <h1>🔑 Acceso al Aula</h1>
    <input type="text" id="nombre-input" class="input-login" placeholder="Tu nombre">
    <input type="password" id="pass-input" class="input-login" placeholder="Tu contraseña">
    <button class="btn" onclick="validarLogin()">Entrar</button>
</div>

<div class="container hidden" id="app-area">
    <h1 id="welcome-msg"></h1>
    <div id="lista-mazos"></div>
    <button class="btn" style="background:#6c757d; margin-top:20px;" onclick="location.reload()">Cerrar Sesión</button>
</div>

<script>
    const SHEETS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vThhYdCFgB1S2jQEhtXtyTaDh4NfNPa8XSkvPkIAvtr2No8Z1z3TYcCjxSqDT3kdnOSa2JMmnU8FP_1/pub?output=csv";
    let datosCompletos = [];

    window.onload = () => {
        Papa.parse(SHEETS_URL, { download: true, complete: (res) => { datosCompletos = res.data; } });
    };

    function validarLogin() {
        const nombre = document.getElementById('nombre-input').value.trim();
        const pass = document.getElementById('pass-input').value.trim();
        
        // Buscamos si existe alguien con ese nombre y contraseña en el CSV
        const usuarioValido = datosCompletos.find(r => r[3]?.trim() === nombre && r[4]?.trim() === pass);

        if (usuarioValido) {
            document.getElementById('login-area').classList.add('hidden');
            document.getElementById('app-area').classList.remove('hidden');
            document.getElementById('welcome-msg').innerText = "Hola, " + nombre;
            mostrarMazos(nombre);
        } else {
            alert("Nombre o contraseña incorrectos.");
        }
    }

    function mostrarMazos(nombre) {
        const lista = document.getElementById('lista-mazos');
        // Filtramos solo lo de este alumno
        const misDatos = datosCompletos.filter(r => r[3]?.trim() === nombre);
        const temas = [...new Set(misDatos.map(r => r[2]))];
        
        temas.forEach(tema => {
            lista.innerHTML += `<div class="mazo-item"><span>${tema}</span><button class="btn" style="width:auto">Abrir</button></div>`;
        });
    }
</script>
</body>
</html>
