<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula Virtual - Angy the teacher</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --nombre-profe: "Angy the teacher";
            --primary: #5cace2; --secondary: #ffb74d; --video-color: #ef5350; --read-color: #66bb6a;
            --bg: #f0f4f8; --dark: #37474f; --shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        /* Marca de agua */
        body::before {
            content: var(--nombre-profe); position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: -1; font-family: 'Great Vibes', cursive; font-size: calc(5rem + 5vw);
            color: rgba(92, 172, 226, 0.02); width: 95vw; text-align: center; pointer-events: none;
        }

        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@400;600&display=swap');

        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); color: var(--dark); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { max-width: 650px; width: 100%; background: white; padding: 25px; border-radius: 30px; box-shadow: var(--shadow); text-align: center; z-index: 1; box-sizing: border-box; }
        .hidden { display: none; }
        
        /* Login */
        .login-input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 15px; border: 2px solid #f0f4f8; background: #f9fbfd; font-size: 1rem; box-sizing: border-box; }
        .btn { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 15px; cursor: pointer; font-weight: 600; width: 100%; margin-top: 10px; font-size: 1rem; transition: 0.2s; }
        
        /* Menú de Pestañas */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { flex: 1; padding: 12px; border-radius: 12px; border: none; background: #e0e7ee; cursor: pointer; font-weight: 600; color: #78909c; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(92, 172, 226, 0.3); }

        /* Estilo de los Recursos */
        .recurso-card { display: flex; align-items: center; justify-content: space-between; background: #fff; border: 1px solid #f0f4f8; padding: 15px; border-radius: 20px; margin-bottom: 12px; text-align: left; transition: 0.3s; }
        .recurso-card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .recurso-info h4 { margin: 0; font-size: 1rem; color: var(--dark); }
        .recurso-info span { font-size: 0.8rem; color: #90a4ae; }
        .btn-action { padding: 8px 15px; border-radius: 10px; border: none; color: white; cursor: pointer; font-weight: 600; font-size: 0.8rem; }

        /* Estilo de Vídeos Empotrados */
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 15px; margin-top: 10px; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .card { font-size: 1.8rem; font-weight: 600; margin: 20px 0; padding: 50px 20px; border-radius: 25px; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.05); cursor: pointer; }
        .answer-text { display: none; margin-top: 20px; color: var(--read-color); font-size: 1.4rem; border-top: 1px solid #eee; padding-top: 20px; }
        .option-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container" id="section-login">
    <h1>🔑 Aula Virtual</h1>
    <p style="color:#78909c">Bienvenido al centro de recursos de Angy</p>
    <input type="text" id="user-name" class="login-input" placeholder="Tu nombre">
    <input type="password" id="user-pass" class="login-input" placeholder="Tu contraseña">
    <button class="btn" onclick="intentarLogin()">Acceder</button>
</div>

<div class="container hidden" id="section-app">
    <h2 id="welcome-title" style="margin-bottom:5px"></h2>
    <p id="current-date" style="font-size:0.8rem; color:#90a4ae; margin-bottom:20px"></p>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="cambiarTab('flashcards', this)">🎴 Flashcards</button>
        <button class="tab-btn" onclick="cambiarTab('lecturas', this)">📖 Lecturas</button>
        <button class="tab-btn" onclick="cambiarTab('videos', this)">🎥 Vídeos</button>
    </div>

    <div id="tab-flashcards" class="tab-content"></div>
    
    <div id="tab-lecturas" class="tab-content hidden"></div>
    
    <div id="tab-videos" class="tab-content hidden"></div>

    <button class="btn" style="background:#90a4ae; margin-top:30px" onclick="location.reload()">Cerrar Sesión</button>
</div>

<div class="container hidden" id="section-visor">
    <h3 id="visor-tema"></h3>
    <div class="card" onclick="document.getElementById('r-visor').style.display='block'">
        <div id="p-visor"></div>
        <div id="r-visor" class="answer-text"></div>
    </div>
    <div style="display:flex; gap:10px;">
        <button class="btn" style="background:#90a4ae" onclick="navegarVisor(-1)">⬅️</button>
        <button class="btn" style="background:#90a4ae" onclick="navegarVisor(1)">➡️</button>
    </div>
    <button class="btn" style="background:var(--dark)" onclick="volverMenu()">Volver</button>
</div>

<div class="container hidden" id="section-test">
    <div id="test-progreso" style="color:var(--primary); font-weight:600"></div>
    <div class="card" id="test-pregunta" style="cursor:default"></div>
    <div id="opciones-container" class="option-grid"></div>
    <div id="escritura-container" class="hidden">
        <input type="text" id="input-escritura" class="login-input" placeholder="Respuesta...">
        <div id="feedback-test" style="margin:10px; font-weight:bold"></div>
        <button class="btn" style="background:var(--read-color)" onclick="comprobarEscritura()">Comprobar</button>
    </div>
    <button class="btn" style="background:#90a4ae" onclick="volverMenu()">Salir</button>
</div>

<script>
    const SHEETS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vThhYdCFgB1S2jQEhtXtyTaDh4NfNPa8XSkvPkIAvtr2No8Z1z3TYcCjxSqDT3kdnOSa2JMmnU8FP_1/pub?output=csv";
    let database = [];
    let recursosAlumno = { flashcards: {}, lecturas: [], videos: [] };
    let mazoActual = [];
    let currentIdx = 0;

    window.onload = () => {
        Papa.parse(SHEETS_URL, { download: true, skipEmptyLines: true, complete: (r) => { database = r.data; } });
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    };

    function intentarLogin() {
        const user = document.getElementById('user-name').value.trim().toLowerCase();
        const pass = document.getElementById('user-pass').value.trim();
        const filas = database.filter(r => r[3]?.trim().toLowerCase() === user && r[4]?.trim() === pass);

        if (filas.length > 0) {
            document.getElementById('section-login').classList.add('hidden');
            document.getElementById('section-app').classList.remove('hidden');
            document.getElementById('welcome-title').innerText = "Hola, " + filas[0][3];
            
            recursosAlumno = { flashcards: {}, lecturas: [], videos: [] };
            filas.forEach(f => {
                const tipo = (f[5] || "Flashcard").trim().toLowerCase();
                if (tipo === "lectura") recursosAlumno.lecturas.push({ titulo: f[0], link: f[1], tema: f[2] });
                else if (tipo === "video") recursosAlumno.videos.push({ titulo: f[0], link: f[1], tema: f[2] });
                else {
                    if (!recursosAlumno.flashcards[f[2]]) recursosAlumno.flashcards[f[2]] = [];
                    recursosAlumno.flashcards[f[2]].push({ p: f[0], r: f[1] });
                }
            });
            renderizarTodo();
        } else alert("Acceso incorrecto");
    }

    function renderizarTodo() {
        // Flashcards
        const fCont = document.getElementById('tab-flashcards');
        fCont.innerHTML = "";
        Object.keys(recursosAlumno.flashcards).forEach(t => {
            fCont.innerHTML += `<div class="recurso-card"><div class="recurso-info"><h4>${t}</h4><span>${recursosAlumno.flashcards[t].length} tarjetas</span></div>
                <div style="display:flex; gap:5px"><button class="btn-action" style="background:#90a4ae" onclick="abrirVisor('${t}')">Ver</button>
                <button class="btn-action" style="background:var(--primary)" onclick="abrirTest('${t}')">Test</button></div></div>`;
        });

        // Lecturas
        const lCont = document.getElementById('tab-lecturas');
        lCont.innerHTML = recursosAlumno.lecturas.length ? "" : "<p>No hay lecturas asignadas</p>";
        recursosAlumno.lecturas.forEach(l => {
            lCont.innerHTML += `<div class="recurso-card"><div class="recurso-info"><h4>${l.titulo}</h4><span>Tema: ${l.tema}</span></div>
                <button class="btn-action" style="background:var(--read-color)" onclick="window.open('${l.link}','_blank')">Abrir PDF</button></div>`;
        });

        // Videos
        const vCont = document.getElementById('tab-videos');
        vCont.innerHTML = recursosAlumno.videos.length ? "" : "<p>No hay vídeos asignados</p>";
        recursosAlumno.videos.forEach(v => {
            const videoId = v.link.split('v=')[1]?.split('&')[0] || v.link.split('/').pop();
            vCont.innerHTML += `<div style="margin-bottom:25px; text-align:left"><h4>${v.titulo}</h4><div class="video-container">
                <iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe></div></div>`;
        });
    }

    function cambiarTab(tab, btn) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.remove('hidden');
        btn.classList.add('active');
    }

    function volverMenu() {
        document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
        document.getElementById('section-app').classList.remove('hidden');
    }

    // --- Lógica de Flashcards (Visor/Test) se mantiene igual que la anterior ---
    function abrirVisor(t) {
        mazoActual = recursosAlumno.flashcards[t]; currentIdx = 0;
        document.getElementById('section-app').classList.add('hidden');
        document.getElementById('section-visor').classList.remove('hidden');
        document.getElementById('visor-tema').innerText = t; mostrarCartaVisor();
    }
    function mostrarCartaVisor() {
        document.getElementById('p-visor').innerText = mazoActual[currentIdx].p;
        document.getElementById('r-visor').innerText = mazoActual[currentIdx].r;
        document.getElementById('r-visor').style.display = 'none';
    }
    function navegarVisor(d) { currentIdx = (currentIdx + d + mazoActual.length) % mazoActual.length; mostrarCartaVisor(); }

    function abrirTest(t) {
        mazoActual = [...recursosAlumno.flashcards[t]].sort(() => Math.random() - 0.5);
        currentIdx = 0;
        document.getElementById('section-app').classList.add('hidden');
        document.getElementById('section-test').classList.remove('hidden');
        const modoE = t.toLowerCase().includes("verbos");
        mostrarPreguntaTest(modoE);
    }

    function mostrarPreguntaTest(modoE) {
        if (currentIdx >= mazoActual.length) { alert("¡Completado!"); return volverMenu(); }
        const item = mazoActual[currentIdx];
        document.getElementById('test-progreso').innerText = `${currentIdx + 1} / ${mazoActual.length}`;
        document.getElementById('test-pregunta').innerText = item.p;
        const optCont = document.getElementById('opciones-container');
        const escCont = document.getElementById('escritura-container');
        
        if (modoE) {
            optCont.classList.add('hidden'); escCont.classList.remove('hidden');
            document.getElementById('input-escritura').value = ""; document.getElementById('feedback-test').innerText = "";
        } else {
            escCont.classList.add('hidden'); optCont.classList.remove('hidden');
            optCont.innerHTML = "";
            let opciones = [item.r, ...[...new Set(database.map(d => d[1]))].filter(x => x !== item.r).sort(() => Math.random() - 0.5).slice(0, 3)].sort(() => Math.random() - 0.5);
            opciones.forEach(o => {
                const b = document.createElement('button'); b.className = "btn"; b.style.background = "white"; b.style.color = "#333"; b.style.border = "1px solid #ddd";
                b.innerText = o; b.onclick = () => { currentIdx++; mostrarPreguntaTest(modoE); };
                optCont.appendChild(b);
            });
        }
    }

    function comprobarEscritura() {
        const input = document.getElementById('input-escritura').value.trim().toLowerCase();
        const correcta = mazoActual[currentIdx].r.trim().toLowerCase();
        const f = document.getElementById('feedback-test');
        if (input === correcta) { f.innerText = "¡Correcto!"; f.style.color = "green"; setTimeout(() => { currentIdx++; mostrarPreguntaTest(true); }, 800); }
        else { f.innerText = "Error, era: " + mazoActual[currentIdx].r; f.style.color = "red"; setTimeout(() => { currentIdx++; mostrarPreguntaTest(true); }, 2000); }
    }
</script>
</body>
</html>
