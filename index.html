<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Flashcards Pro - Modo Anki</title>
    <style>
        /* ... Estilos anteriores ... */
        .card-flip { perspective: 1000px; width: 100%; height: 200px; cursor: pointer; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .card-flip.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; border: 2px solid #4a90e2; border-radius: 15px; padding: 20px; box-sizing: border-box; background: white; font-size: 1.5rem; }
        .card-back { transform: rotateY(180deg); background: #f0f7ff; }
        .nav-btns { margin-top: 20px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<button class="btn" style="background: #6c5ce7;" onclick="prepararRepaso()">Modo Repaso (Anki)</button>

<div class="container hidden" id="repaso-area">
    <div id="progreso-repaso"></div>
    <div class="card-flip" id="card-flip" onclick="this.classList.toggle('flipped')">
        <div class="card-inner">
            <div class="card-front" id="frente"></div>
            <div class="card-back" id="dorso"></div>
        </div>
    </div>
    <div class="nav-btns">
        <button class="btn" style="width: 45%" onclick="cambiarTarjeta(-1)">← Anterior</button>
        <button class="btn" style="width: 45%" onclick="cambiarTarjeta(1)">Siguiente →</button>
    </div>
    <button class="btn" style="background: #999" onclick="location.reload()">Volver</button>
</div>

<script>
    let tarjetasRepaso = [];
    let indiceRepaso = 0;

    function prepararRepaso() {
        const seleccionados = Array.from(document.querySelectorAll('.mazo-check:checked')).map(c => c.value);
        if (seleccionados.length === 0) return alert("Selecciona mazos");
        
        tarjetasRepaso = [];
        seleccionados.forEach(n => tarjetasRepaso.push(...biblioteca[n]));
        
        document.getElementById('app-home').classList.add('hidden');
        document.getElementById('repaso-area').classList.remove('hidden');
        mostrarTarjetaRepaso();
    }

    function mostrarTarjetaRepaso() {
        document.getElementById('frente').innerText = tarjetasRepaso[indiceRepaso].p;
        document.getElementById('dorso').innerText = tarjetasRepaso[indiceRepaso].r;
        document.getElementById('card-flip').classList.remove('flipped');
        document.getElementById('progreso-repaso').innerText = `Tarjeta ${indiceRepaso + 1} / ${tarjetasRepaso.length}`;
    }

    function cambiarTarjeta(dir) {
        indiceRepaso += dir;
        if (indiceRepaso < 0) indiceRepaso = 0;
        if (indiceRepaso >= tarjetasRepaso.length) indiceRepaso = tarjetasRepaso.length - 1;
        mostrarTarjetaRepaso();
    }
</script>
</body>
</html>
