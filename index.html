<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards Pro PWA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --primary: #4a90e2; --success: #2ecc71; --error: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { max-width: 500px; width: 100%; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; margin-top: 20px; }
        .hidden { display: none; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; margin: 5px; font-size: 1rem; transition: 0.3s; }
        .btn:hover { opacity: 0.8; }
        .option-btn { display: block; width: 100%; margin: 10px 0; background: #f8f9fa; color: #333; border: 1px solid #ddd; padding: 15px; font-size: 1rem; border-radius: 10px; }
        .option-btn:hover { background: #e9ecef; border-color: var(--primary); }
        .card { font-size: 1.4rem; font-weight: bold; margin: 20px 0; padding: 30px; border: 3px solid var(--primary); border-radius: 15px; background: #fff; min-height: 100px; display: flex; align-items: center; justify-content: center; box-shadow: inset 0 0 10px rgba(0,0,0,0.05); }
        #progreso { color: #666; font-size: 0.9rem; margin-bottom: 10px; font-weight: 600; }
        .result-item { text-align: left; padding: 15px; border-bottom: 1px solid #eee; }
        .err-text { color: var(--error); font-weight: bold; }
        .corr-text { color: var(--success); font-weight: bold; }
    </style>
</head>
<body>

<div class="container" id="setup">
    <h2>📚 Mis Flashcards</h2>
    <p>Sube tu archivo .csv (Numbers o Excel)</p>
    <input type="file" id="csvFile" accept=".csv" style="margin-bottom: 20px;">
    <div id="menu" class="hidden">
        <button class="btn" onclick="iniciarTest()">Empezar Test</button>
    </div>
</div>

<div class="container hidden" id="test-area">
    <div id="progreso"></div>
    <div class="card" id="pregunta-texto">Cargando...</div>
    <div id="opciones-container"></div>
</div>

<div class="container hidden" id="resultados">
    <h2>Resultados</h2>
    <h3 id="puntuacion-final"></h3>
    <div id="lista-errores"></div>
    <button class="btn" onclick="location.reload()">Reiniciar</button>
</div>

<script>
    let mazo = [];
    let indiceActual = 0;
    let puntuacion = 0;
    let errores = [];

    document.getElementById('csvFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        Papa.parse(file, {
            delimiter: "", 
            skipEmptyLines: true,
            complete: function(results) {
                // LÓGICA DE LIMPIEZA AVANZADA
                mazo = results.data
                    .map(fila => fila.filter(celda => celda.trim() !== "")) // Quitar celdas vacías en la fila
                    .filter(fila => fila.length >= 2) // Solo filas con al menos 2 datos
                    .map(fila => ({
                        p: fila[0].trim(),
                        r: fila[1].trim()
                    }));

                if(mazo.length > 0) {
                    document.getElementById('menu').classList.remove('hidden');
                    alert("¡Cargadas " + mazo.length + " tarjetas correctamente!");
                } else {
                    alert("No pudimos leer las preguntas. Asegúrate de que el archivo tenga al menos dos columnas con texto.");
                }
            }
        });
    });

    function iniciarTest() {
        indiceActual = 0;
        puntuacion = 0;
        errores = [];
        document.getElementById('setup').classList.add('hidden');
        document.getElementById('test-area').classList.remove('hidden');
        mostrarSiguientePregunta();
    }

    function mostrarSiguientePregunta() {
        if (indiceActual >= mazo.length) return mostrarResultados();

        const data = mazo[indiceActual];
        document.getElementById('progreso').innerText = `Pregunta ${indiceActual + 1} de ${mazo.length}`;
        document.getElementById('pregunta-texto').innerText = data.p;
        
        // Generar opciones
        let opciones = [data.r];
        let todasLasRespuestas = mazo.map(t => t.r);
        
        // Mezclar todas las posibles respuestas para elegir incorrectas
        let posiblesIncorrectas = todasLasRespuestas.filter(r => r !== data.r);
        posiblesIncorrectas.sort(() => Math.random() - 0.5);
        
        for(let i=0; i < posiblesIncorrectas.length && opciones.length < 4; i++) {
            if(!opciones.includes(posiblesIncorrectas[i])) {
                opciones.push(posiblesIncorrectas[i]);
            }
        }
        
        // Mezclar las 4 opciones finales
        opciones.sort(() => Math.random() - 0.5);

        const container = document.getElementById('opciones-container');
        container.innerHTML = '';
        opciones.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => verificarRespuesta(opt);
            container.appendChild(btn);
        });
    }

    function verificarRespuesta(elegida) {
        const correcta = mazo[indiceActual].r;
        if (elegida === correcta) {
            puntuacion++;
        } else {
            errores.push({ preg: mazo[indiceActual].p, corr: correcta, tuya: elegida });
        }
        indiceActual++;
        mostrarSiguientePregunta();
    }

    function mostrarResultados() {
        document.getElementById('test-area').classList.add('hidden');
        document.getElementById('resultados').classList.remove('hidden');
        document.getElementById('puntuacion-final').innerText = `Puntuación: ${puntuacion} / ${mazo.length}`;
        
        const lista = document.getElementById('lista-errores');
        lista.innerHTML = errores.length > 0 ? '<h4>Errores cometidos:</h4>' : '<h4>¡Impresionante! ¡Has acertado todas!</h4>';
        
        errores.forEach(e => {
            lista.innerHTML += `
                <div class="result-item">
                    <strong>P: ${e.preg}</strong><br>
                    Tu respuesta: <span class="err-text">${e.tuya}</span><br>
                    Correcta: <span class="corr-text">${e.corr}</span>
                </div>`;
        });
    }
</script>
</body>
</html>
