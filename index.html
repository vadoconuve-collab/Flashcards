<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angy the Teacher - Aula Virtual</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Dancing+Script:wght@500&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --primary: #0F172A; 
            --accent: #3B82F6;  
            --bg: #F8FAFC;      
            --white: #FFFFFF;
            --text-main: #334155;
            --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex; justify-content: center;
            min-height: 100vh; overflow-x: hidden;
        }

        /* Marca de agua elegante */
        body::after {
            content: "Angy the teacher";
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            font-family: 'Dancing Script', cursive;
            font-size: 10vw; color: rgba(15, 23, 42, 0.02);
            z-index: -1; pointer-events: none; white-space: nowrap;
        }

        .container { width: 100%; max-width: 600px; padding: 40px 20px; box-sizing: border-box; z-index: 1; }

        .card-panel {
            background: var(--white); border-radius: 24px;
            padding: 40px; box-shadow: var(--shadow);
            text-align: center; transition: all 0.4s ease;
        }

        h1, h2 { font-family: 'Poppins', sans-serif; color: var(--primary); margin: 0; }
        
        .login-input {
            width: 100%; padding: 16px; margin-bottom: 12px;
            border: 1px solid #E2E8F0; border-radius: 12px;
            font-size: 1rem; outline: none; box-sizing: border-box;
        }

        .btn-primary {
            background: var(--primary); color: white; padding: 16px;
            border: none; border-radius: 12px; width: 100%;
            font-weight: 600; cursor: pointer; transition: 0.3s;
        }

        .btn-primary:hover { transform: translateY(-2px); background: #1E293B; }

        .nav-tabs { display: flex; gap: 10px; margin-bottom: 25px; }
        .tab-item {
            flex: 1; padding: 12px; background: #E2E8F0; border-radius: 10px;
            font-size: 0.85rem; font-weight: 600; cursor: pointer;
            text-align: center; color: #64748B; transition: 0.3s;
        }
        .tab-item.active { background: var(--accent); color: white; }

        .resource-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 20px; background: #F1F5F9; border-radius: 16px;
            margin-bottom: 12px; text-align: left;
        }

        .btn-action {
            background: var(--white); border: 1px solid #E2E8F0;
            padding: 8px 16px; border-radius: 8px; font-weight: 600; cursor: pointer;
        }

        .flashcard-box {
            min-height: 200px; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: #F8FAFC; border: 2px solid #F1F5F9;
            border-radius: 20px; padding: 30px; margin: 20px 0; cursor: pointer;
        }

        .flashcard-q { font-size: 1.8rem; font-weight: 600; color: var(--primary); }
        .flashcard-a { display: none; margin-top: 20px; font-size: 1.4rem; color: var(--accent); border-top: 1px solid #CBD5E1; padding-top: 20px; width: 100%; }

        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 16px; overflow: hidden; margin-top: 15px; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="view-login" class="card-panel">
        <h1 style="font-size: 0.9rem; letter-spacing: 2px; color: #64748B; text-transform: uppercase;">Aula Virtual</h1>
        <h2 style="font-size: 2.2rem; margin-bottom: 30px;">Angy the teacher</h2>
        <input type="text" id="user-name" class="login-input" placeholder="Nombre">
        <input type="password" id="user-pass" class="login-input" placeholder="Contraseña">
        <button class="btn-primary" onclick="handleLogin()">Entrar</button>
    </div>

    <div id="view-dashboard" class="hidden">
        <div class="card-panel">
            <h2 id="student-name" style="text-align: left; margin-bottom: 20px;"></h2>
            <div class="nav-tabs">
                <div class="tab-item active" onclick="switchTab('flashcards', this)">🎴 Flashcards</div>
                <div class="tab-item" onclick="switchTab('lecturas', this)">📖 Lecturas</div>
                <div class="tab-item" onclick="switchTab('videos', this)">🎥 Vídeos</div>
            </div>
            <div id="content-flashcards" class="tab-content"></div>
            <div id="content-lecturas" class="tab-content hidden"></div>
            <div id="content-videos" class="tab-content hidden"></div>
            <button class="btn-primary" style="background: #64748B; margin-top: 30px;" onclick="location.reload()">Cerrar Sesión</button>
        </div>
    </div>

    <div id="view-study" class="hidden">
        <div class="card-panel">
            <h3 id="study-topic">Estudio</h3>
            <div id="study-progress" style="font-size: 0.8rem; color: #94A3B8; margin-bottom: 10px;"></div>
            <div class="flashcard-box" onclick="document.getElementById('flash-a').style.display='block'">
                <div id="flash-q" class="flashcard-q"></div>
                <div id="flash-a" class="flashcard-a"></div>
            </div>
            <div id="writing-area" class="hidden">
                <input type="text" id="write-input" class="login-input" style="text-align: center;" placeholder="Escribe aquí...">
                <div id="write-feedback" style="margin-bottom: 10px; font-weight: 600;"></div>
