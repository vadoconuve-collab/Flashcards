<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards Angy the Teacher - Estudiante</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --nombre-profe: "Angy the teacher";
            --primary: #4a90e2; --success: #2ecc71; --error: #e74c3c; --bg: #f4f7f6; --dark: #2c3e50;
        }

        body::before {
            content: var(--nombre-profe);
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: -1; font-family: 'Great Vibes', cursive; font-size: 8rem;
            color: rgba(74, 144, 226, 0.015); width: 95vw; text-align: center; white-space: nowrap; pointer-events: none;
        }
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap');

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--dark); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { max-width: 600px; width: 100%; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); text-align: center; z-index: 1; }
        .hidden { display: none; }
        
        .btn { background: var(--primary); color: white; border: none; padding: 15px 24px; border-radius: 12px; cursor: pointer; font-weight: 600; width: 100%; margin-top: 15px; font-size: 1rem; transition: 0.2s; }
        .btn-mini { width: auto; margin: 0; padding: 8px 15px; font-size: 0.9rem; }
        .btn-secondary { background: #6c757d; margin-top: 10px; }
        
        .mazo-item { display: flex; align-items: center; justify-content: space-between; background: #f8f9fa; margin: 12px 0; padding: 15px; border-radius: 12px; border: 1px solid #e0e0e0; font-weight: 500; text-align: left; }
        .card { font-size: 1.8rem; font-weight: bold; margin: 25px 0; padding: 50px 20px; border: 3px solid var(--primary); border-radius: 25px; background: #fff; min-height: 150px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .answer-text { display: none; margin-top: 20px; color: var(--success); font-size: 1.4rem; border-top: 1px solid #eee; padding-top: 15px; width: 80%; }
    </style>
</head>
<body>

<div class="container" id="app-home">
    <h1>📚 Mis Flashcards</h1>
    <p>Biblioteca de <strong>Angy the teacher</strong></p>
    <div id="loading">Cargando temas...</div>
    <div id="contenido-app" class="hidden">
        <h3>Selecciona un tema para estudiar:</h3>
        <div id="lista-mazos"></div>
        <p style="font-size: 0.8rem; color: #999; margin-top: 20px;">Marca los temas que quieras incluir en el Test</p>
        <button id="btn-test" class="btn" onclick="iniciarTest()">Hacer Test Combinado</button>
    </div>
</div>

<div class="container hidden" id="visor-area">
    <h3 id="visor-titulo"></h3>
    <div class="card" onclick="voltearCarta()">
        <div id="p-texto"></div>
        <div id="r-texto" class="answer-text"></div>
        <small style="margin-top:20px; color:#bbb;">(Toca para ver respuesta)</small>
    </div>
    <div style="display:flex; gap:10px;">
        <button class="btn btn-secondary" onclick="navegarCarta(-1)">⬅️</button>
        <button class="btn btn-secondary" onclick="navegarCarta(1)">➡️</button>
    </div>
    <button class="btn" style="background:#444;" onclick="location.reload()">Volver</button>
</div>

<div class="container hidden" id="test-area">
    <div id="test-progreso" style="font-weight:bold; color:var(--primary);"></div>
    <div class="card" id="test-pregunta" style="cursor:default;"></div>
    <div id="opciones-container"></div>
    <button class="btn btn-secondary" onclick="location.reload()">Abandonar</button>
</div>

<script>
    const SHEETS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vThhYdCFgB1S2jQEhtXtyTaDh4NfNPa8XSkvPkIAvtr2No8Z1z3TYcCjxSqDT3kdnOSa2JMmnU8FP_1/pub?output=csv";

    let biblioteca = {}; // Agrupado por nombres de mazo
    let mazoParaEstudiar = [];
    let currentIdx = 0;

    window.onload = function() {
        Papa.parse(SHEETS_URL, {
            download: true,
            skipEmptyLines: true,
            complete: function(results) {
                // Procesamos las filas: [Pregunta, Respuesta, NombreMazo]
                results.data.forEach(row => {
                    if (row.length >= 2) {
                        const mazoNombre = (row[2] || "General").trim();
                        if (!biblioteca[mazoNombre]) biblioteca[mazoNombre] = [];
                        biblioteca[mazoNombre].push({ p: row[0].trim(), r: row[1].trim() });
                    }
                });

                document.getElementById('loading').classList.add('hidden');
                document.getElementById('contenido-app').classList.remove('hidden');
                renderLista();
            }
        });
    };

    function renderLista() {
        const lista = document.getElementById('lista-mazos');
        Object.keys(biblioteca).forEach(nombre => {
            const div = document.createElement('div');
            div.className = 'mazo-item';
            div.innerHTML = `
                <div>
                    <input type="checkbox" class="mazo-check" value="${nombre}">
                    <span>${nombre} (${biblioteca[nombre].length})</span>
                </div>
                <button class="btn btn-mini" onclick="abrirVisor('${nombre}')">Ver</button>
            `;
            lista.appendChild(div);
        });
    }

    function abrirVisor(nombre) {
        mazoParaEstudiar = biblioteca[nombre];
        currentIdx = 0;
        document.getElementById('app-home').classList.add('hidden');
        document.getElementById('visor-area').classList.remove('hidden');
        mostrarCartaVisor();
    }

    function mostrarCartaVisor() {
        document.getElementById('visor-titulo').innerText = `${currentIdx + 1} / ${mazoParaEstudiar.length}`;
        document.getElementById('p-texto').innerText = mazoParaEstudiar[currentIdx].p;
        document.getElementById('r-texto').innerText = mazoParaEstudiar[currentIdx].r;
        document.getElementById('r-texto').style.display = 'none';
    }

    function voltearCarta() {
        const r = document.getElementById('r-texto');
        r.style.display = (r.style.display === 'none') ? 'block' : 'none';
    }

    function navegarCarta(dir) {
        currentIdx += dir;
        if (currentIdx < 0) currentIdx = mazoParaEstudiar.length - 1;
        if (currentIdx >= mazoParaEstudiar.length) currentIdx = 0;
        mostrarCartaVisor();
    }

    function iniciarTest() {
        const checks = document.querySelectorAll('.mazo-check:checked');
        mazoParaEstudiar = [];
        checks.forEach(c => { mazoParaEstudiar = [...mazoParaEstudiar, ...biblioteca[c.value]]; });

        if (mazoParaEstudiar.length === 0) return alert("Selecciona al menos un tema");

        mazoParaEstudiar.sort(() => Math.random() - 0.5);
        currentIdx = 0;
        document.getElementById('app-home').classList.add('hidden');
        document.getElementById('test-area').classList.remove('hidden');
        mostrarPreguntaTest();
    }

    function mostrarPreguntaTest() {
        if (currentIdx >= mazoParaEstudiar.length) {
            alert("¡Test completado!");
            return location.reload();
        }
        const item = mazoParaEstudiar[currentIdx];
        document.getElementById('test-progreso').innerText = `Tarjeta ${currentIdx + 1} de ${mazoParaEstudiar.length}`;
        document.getElementById('test-pregunta').innerText = item.p;

        let opciones = [item.r];
        let todasLasR = Object.values(biblioteca).flat().map(x => x.r);
        let incorrectas = todasLasR.filter(r => r !== item.r).sort(() => Math.random() - 0.5);
        opciones = [...opciones, ...incorrectas.slice(0, 3)].sort(() => Math.random() - 0.5);

        const container = document.getElementById('opciones-container');
        container.innerHTML = "";
        opciones.forEach(opt => {
            const b = document.createElement('button');
            b.className = "btn btn-secondary"; b.style.background = "white"; b.style.color = "#333";
            b.innerText = opt;
            b.onclick = () => { currentIdx++; mostrarPreguntaTest(); };
            container.appendChild(b);
        });
    }
</script>
</body>
</html>
