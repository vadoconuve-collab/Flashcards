<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angy the Teacher - Aula Virtual</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Dancing+Script:wght@500&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --primary: #0F172A; 
            --accent: #3B82F6;  
            --bg: #F8FAFC;
            --glass: rgba(255, 255, 255, 0.15); /* Ultra transparencia como pediste */
        }

        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background-color: var(--bg); display: flex; justify-content: center; min-height: 100vh; background-attachment: fixed; }

        /* MARCA DE AGUA POTENCIADA */
        body::before {
            content: "Angy the teacher"; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            font-family: 'Dancing Script', cursive; font-size: 12vw; 
            color: rgba(15, 23, 42, 0.25) !important; z-index: -1; pointer-events: none;
            white-space: nowrap;
        }

        .container { width: 100%; max-width: 550px; padding: 40px 20px; box-sizing: border-box; }

        /* PANEL CRISTALINO */
        .card-panel { 
            background: var(--glass) !important; 
            backdrop-filter: blur(5px) !important; 
            -webkit-backdrop-filter: blur(5px);
            border-radius: 30px; padding: 30px; 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05); 
            text-align: center; border: 1px solid rgba(255, 255, 255, 0.4); 
        }

        /* PESTAÑAS CON ICONOS */
        .nav-tabs { display: flex; gap: 8px; margin-bottom: 25px; }
        .tab-item { flex: 1; padding: 12px; background: rgba(255,255,255,0.4); border-radius: 15px; font-size: 0.8rem; font-weight: 600; cursor: pointer; color: #64748B; text-align: center; transition: 0.3s; }
        .tab-item.active { background: var(--primary); color: white; }

        .resource-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px; background: rgba(255,255,255,0.4); border-radius: 20px;
            margin-bottom: 12px; text-align: left; border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-primary { background: var(--primary); color: white; padding: 14px; border: none; border-radius: 12px; width: 100%; font-weight: 600; cursor: pointer; font-family: 'Poppins', sans-serif; }
        .btn-small { padding: 8px 12px; font-size: 0.75rem; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; margin-left: 5px; display: inline-flex; align-items: center; gap: 4px; }
        .btn-repasar { background: var(--accent); color: white; }
        .btn-test { background: var(--primary); color: white; }

        .flashcard-box { min-height: 180px; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(255,255,255,0.2); border-radius: 25px; padding: 25px; margin: 20px 0; cursor: pointer; border: 1px solid rgba(255,255,255,0.3); }
        .flashcard-q { font-size: 1.6rem; font-weight: 600; color: var(--primary); }
        .flashcard-a { display: none; margin-top: 15px; font-size: 1.3rem; color: var(--accent); border-top: 1px solid rgba(0,0,0,0.1); padding-top: 15px; width: 100%; }

        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 16px; overflow: hidden; margin-top: 10px; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        .hidden { display: none !important; }
        #writing-area { margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.3); border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); }
        #write-input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.1); box-sizing: border-box; text-align: center; font-size: 1rem; margin-bottom: 10px; outline: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="view-login" class="card-panel">
        <h2 style="font-family: 'Poppins'; margin-bottom: 0;">Angy</h2>
        <p style="font-family: 'Dancing Script'; font-size: 1.4rem; color: var(--accent); margin-top: -5px;">the teacher</p>
        <div style="margin-top: 30px;">
            <input type="text" id="user-name" style="width:100%; padding:15px; margin-bottom:10px; border-radius:12px; border:1px solid #ddd; background: rgba(255,255,255,0.7);" placeholder="Tu nombre">
            <input type="password" id="user-pass" style="width:100%; padding:15px; margin-bottom:20px; border-radius:12px; border:1px solid #ddd; background: rgba(255,255,255,0.7);" placeholder="Contraseña">
            <button class="btn-primary" onclick="handleLogin()">Entrar al Aula 🔑</button>
        </div>
    </div>

    <div id="view-dashboard" class="hidden">
        <div class="card-panel">
            <h2 id="student-display" style="text-align: left; font-size: 1.4rem; margin-bottom: 20px;"></h2>
            
            <div class="nav-tabs">
                <div class="tab-btn tab-item active" onclick="switchTab('flashcards', this)">🎴 Mazos</div>
                <div class="tab-btn tab-item" onclick="switchTab('lecturas', this)">📖 Leer</div>
                <div class="tab-btn tab-item" onclick="switchTab('videos', this)">🎥 Ver</div>
            </div>

            <div id="content-flashcards" class="tab-content"></div>
            <div id="content-lecturas" class="tab-content hidden"></div>
            <div id="content-videos" class="tab-content hidden"></div>

            <button class="btn-primary" style="margin-top: 35px; background: #64748B; font-size: 0.8rem;" onclick="location.reload()">Cerrar Sesión 👋</button>
        </div>
    </div>

    <div id="view-study" class="hidden">
        <div class="card-panel">
            <h3 id="study-topic" style="color: #64748B; font-size: 1rem; margin-bottom: 5px;"></h3>
            <div id="study-progress" style="font-size: 0.7rem; color: #94A3B8; margin-bottom: 10px;"></div>
            
            <div class="flashcard-box" onclick="showAnswer()">
                <div id="flash-q" class="flashcard-q"></div>
                <div id="flash-a" class="flashcard-a"></div>
            </div>

            <div id="writing-area" class="hidden">
                <input type="text" id="write-input" placeholder="Escribe aquí la respuesta...">
                <button class="btn-primary" onclick="checkWriting()">Comprobar ✨</button>
                <div id="write-feedback" style="margin-top:10px; font-weight:600;"></div>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 25px;">
                <button class="btn-primary" style="background: #94A3B8;" onclick="moveCard(-1)">⬅️</button>
                <button class="btn-primary" onclick="moveCard(1)">Siguiente ➡️</button>
            </div>
            <button class="btn-primary" style="background: transparent; color: #64748B; border: 1px solid #ddd; margin-top: 15px; font-size: 0.8rem;" onclick="exitStudy()">Volver al menú</button>
        </div>
    </div>
</div>

<script>
    const SHEETS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vThhYdCFgB1S2jQEhtXtyTaDh4NfNPa8XSkvPkIAvtr2No8Z1z3TYcCjxSqDT3kdnOSa2JMmnU8FP_1/pub?output=csv";
    let db = [], items = { flashcards: {}, readings: [], videos: [] }, mazo = [], idx = 0, modoTest = false;

    window.onload = () => Papa.parse(SHEETS_URL, { download: true, complete: (res) => db = res.data });

    function handleLogin() {
        const u = document.getElementById('user-name').value.trim().toLowerCase();
        const p = document.getElementById('user-pass').value.trim();
        const rows = db.filter(r => r[3]?.toLowerCase() === u && r[4] === p);
        
        if (rows.length) {
            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('view-dashboard').classList.remove('hidden');
            document.getElementById('student-display').innerText = "¡Hola, " + rows[0][3] + "! ✨";
            
            // RESET ITEMS PARA EVITAR DUPLICADOS
            items = { flashcards: {}, readings: [], videos: [] };

            rows.forEach(r => {
                const type = (r[5] || "").trim().toLowerCase();
                if (type === "lectura") items.readings.push({t:r[0], l:r[1], c:r[2]});
                else if (type === "video") items.videos.push({t:r[0], l:r[1], c:r[2]});
                else {
                    const cat = r[2] || "General";
                    if (!items.flashcards[cat]) items.flashcards[cat] = [];
                    items.flashcards[cat].push({q:r[0], a:r[1]});
                }
            });
            render();
        } else alert("Revisa tus datos 🧐");
    }

    function render() {
        // MAZOS
        const fCon = document.getElementById('content-flashcards');
        fCon.innerHTML = "";
        Object.keys(items.flashcards).forEach(cat => {
            fCon.innerHTML += `<div class="resource-row"><span style="font-weight:600; font-size:0.9rem;">${cat}</span><div><button class="btn-small btn-repasar" onclick="startStudy('${cat}', false)">🎴 Ver</button><button class="btn-small btn-test" onclick="startStudy('${cat}', true)">✍️ Test</button></div></div>`;
        });

        // LECTURAS
        document.getElementById('content-lecturas').innerHTML = items.readings.map(l => 
            `<div class="resource-row"><div><h4 style="margin:0; font-size:0.9rem;">${l.t}</h4><span style="font-size:0.75rem; color:#64748B;">${l.c}</span></div><button class="btn-small btn-repasar" onclick="window.open('${l.l}')">📖 Leer</button></div>`
        ).join('') || "<p style='font-size:0.8rem; opacity:0.6'>No hay lecturas asignadas.</p>";

        // VIDEOS
        document.getElementById('content-videos').innerHTML = items.videos.map(v => {
            const id = v.l.split('v=')[1]?.split('&')[0] || v.l.split('/').pop();
            return `<div style="margin-bottom:20px;text-align:left"><h4 style="font-size:0.9rem; margin-bottom:8px;">🎥 ${v.t}</h4><div class="video-wrapper"><iframe src="https://www.youtube.com/embed/${id}"></iframe></div></div>`;
        }).join('') || "<p style='font-size:0.8rem; opacity:0.6'>No hay vídeos asignados.</p>";
    }

    function switchTab(id, el) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
        document.getElementById('content-' + id).classList.remove('hidden');
        el.classList.add('active');
    }

    function startStudy(cat, isTest) {
        mazo = [...items.flashcards[cat]].sort(() => Math.random() - 0.5);
        idx = 0; modoTest = isTest;
        const esVerbo = cat.toLowerCase().includes("verbo");

        document.getElementById('view-dashboard').classList.add('hidden');
        document.getElementById('view-study').classList.remove('hidden');
        document.getElementById('study-topic').innerText = cat + (modoTest ? " • Modo Test" : " • Modo Repaso");
        
        if (modoTest && esVerbo) document.getElementById('writing-area').classList.remove('hidden');
        else document.getElementById('writing-area').classList.add('hidden');
        
        updateCard();
    }

    function updateCard() {
        document.getElementById('flash-q').innerText = mazo[idx].q;
        document.getElementById('flash-a').innerText = mazo[idx].a;
        document.getElementById('flash-a').style.display = "none";
        document.getElementById('write-feedback').innerText = "";
        document.getElementById('write-input').value = "";
        document.getElementById('study-progress').innerText = `TARJETA ${idx + 1} DE ${mazo.length}`;
    }

    function showAnswer() { 
        if (!modoTest || (modoTest && !document.getElementById('study-topic').innerText.toLowerCase().includes("verbo"))) {
            document.getElementById('flash-a').style.display = "block"; 
        }
    }

    function checkWriting() {
        const val = document.getElementById('write-input').value.trim().toLowerCase();
        const correct = mazo[idx].a.toLowerCase();
        const feed = document.getElementById('write-feedback');
        if (val === correct) {
            feed.innerText
